<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FHDA Policy Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-head">
                <span class="sidebar-logo">FHDA</span>
                <span class="sidebar-title">Policy Tracker</span>
            </div>
            <div class="sidebar-label">Chapters</div>
            <nav class="sidebar-nav" id="chapter-nav">
                <button class="nav-btn active" data-chapter="all">All Chapters</button>
                <button class="nav-btn" data-chapter="Chapter 1 - The District">1 &mdash; The District</button>
                <button class="nav-btn" data-chapter="Chapter 2 - Board of Trustees">2 &mdash; Board of Trustees</button>
                <button class="nav-btn" data-chapter="Chapter 3 - General Institution">3 &mdash; General Institution</button>
                <button class="nav-btn" data-chapter="Chapter 4 - Academic Affairs">4 &mdash; Academic Affairs</button>
                <button class="nav-btn" data-chapter="Chapter 5 - Student Services">5 &mdash; Student Services</button>
                <button class="nav-btn" data-chapter="Chapter 6 - Business and Fiscal Affairs">6 &mdash; Business &amp; Fiscal</button>
                <button class="nav-btn" data-chapter="Chapter 7 - Human Resources">7 &mdash; Human Resources</button>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main">
            <header class="topbar">
                <button class="menu-btn" id="menu-btn" aria-label="Toggle sidebar">&#9776;</button>
                <h1 class="topbar-title">Board Policy &amp; Administrative Procedure Tracker</h1>
                <button class="theme-btn" id="theme-toggle" aria-label="Toggle theme">
                    <span class="t-sun">&#9788;</span><span class="t-moon">&#9790;</span>
                </button>
            </header>

            <div class="metrics">
                <div class="metric"><span class="metric-val" id="stat-total">0</span><span class="metric-lbl">Total</span></div>
                <div class="metric"><span class="metric-val accent-yellow" id="stat-review">0</span><span class="metric-lbl">Review</span></div>
                <div class="metric"><span class="metric-val accent-blue" id="stat-progress">0</span><span class="metric-lbl">In Progress</span></div>
                <div class="metric"><span class="metric-val accent-green" id="stat-completed">0</span><span class="metric-lbl">Done</span></div>
            </div>

            <div class="bar">
                <input type="text" id="search-input" class="search" placeholder="Search policies...">
                <select id="sort-select" class="sort">
                    <option value="number-asc">Number &uarr;</option>
                    <option value="number-desc">Number &darr;</option>
                    <option value="title-asc">A &rarr; Z</option>
                    <option value="title-desc">Z &rarr; A</option>
                    <option value="revised-desc">Newest</option>
                    <option value="revised-asc">Oldest</option>
                    <option value="status">Status</option>
                </select>
            </div>

            <nav class="tabs" id="filter-nav">
                <button class="tab active" data-filter="all">All <span id="count-all">0</span></button>
                <button class="tab" data-filter="legally-required">Legally Required <span id="count-legally-required">0</span></button>
                <button class="tab" data-filter="legally-recommended">Legally Recommended <span id="count-legally-recommended">0</span></button>
                <button class="tab" data-filter="optional">Optional <span id="count-optional">0</span></button>
            </nav>

            <section class="table-wrap" id="table-section">
                <table>
                    <thead>
                        <tr>
                            <th>Policy Name</th>
                            <th>Number</th>
                            <th>Type</th>
                            <th>Category</th>
                            <th>Timeline</th>
                            <th>Updated</th>
                            <th>Due Date</th>
                        </tr>
                    </thead>
                    <tbody id="documents-tbody"></tbody>
                </table>
            </section>
            <div class="empty" id="empty-state" style="display:none;"><p>No results.</p></div>
        </main>
    </div>

    <!-- Detail Modal -->
    <div class="overlay" id="detail-modal-overlay">
        <div class="modal">
            <div class="modal-bar"><h2 id="detail-modal-title">Details</h2><button class="modal-x" id="detail-modal-close">&times;</button></div>
            <div class="modal-body" id="detail-modal-body"></div>
        </div>
    </div>

    <!-- Timeline Modal -->
    <div class="overlay" id="timeline-overlay">
        <div class="modal modal-wide">
            <div class="modal-bar">
                <h2 id="timeline-title">Approval Timeline</h2>
                <button class="modal-x" id="timeline-close">&times;</button>
            </div>
            <div class="modal-body" id="timeline-body">
                <p class="timeline-sub" id="timeline-sub"></p>
                <div class="timeline">
                    <div class="timeline-track"></div>
                    <div class="timeline-progress" id="timeline-progress"></div>
                    <div class="timeline-nodes" id="timeline-nodes"></div>
                </div>
                <div class="timeline-status" id="timeline-status"></div>
                <div class="timeline-actions">
                    <button class="tl-add-btn" id="tl-add-stage">+ Add Stage</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="overlay" id="delete-confirm-overlay">
        <div class="modal modal-sm">
            <div class="modal-body delete-confirm-body">
                <p class="delete-confirm-text">Are you sure you would like to delete this?</p>
                <div class="delete-confirm-actions">
                    <button class="delete-confirm-btn delete-yes" id="delete-confirm-yes">Yes, Delete</button>
                    <button class="delete-confirm-btn delete-no" id="delete-confirm-no">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="policies-data.js"></script>
    <script src="policies-content.js"></script>
    <script src="app.js"></script>
</body>
</html>
